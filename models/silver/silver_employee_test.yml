version: 2

models:
  - name: silver_employee
    description: Cleaned Employee Silver Table

    columns:

      - name: employee_id
        tests:
          - unique
          - not_null

      - name: first_name
        tests:
          - not_null

      - name: last_name
        tests:
          - not_null

      - name: full_name
        tests:
          - not_null

      - name: email
        tests:
          - unique
          - not_null

      - name: phone
        tests:
          - not_null

      - name: date_of_birth
        tests:
          - not_null

      - name: hire_date
        tests:
          - not_null

      - name: last_modified_date
        tests:
          - not_null

      - name: tenure_years
        tests:
          - not_null

      - name: department
        tests:
          - not_null

      - name: role
        tests:
          - not_null

      - name: education
        tests:
          - not_null

      - name: employment_status
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - Active
                  - Inactive
                  - Terminated
                  - On Leave

      - name: manager_id
        tests:
        - relationships:
           arguments:
              to: ref('silver_employee')
              field: employee_id
           config:
              where: "manager_id is not null"

      - name: work_location
        tests:
          - not_null

      - name: salary
        tests:
          - not_null

      - name: sales_target
        tests:
          - not_null

      - name: current_sales
        tests:
          - not_null

      - name: performance_rating
        tests:
          - not_null

      - name: target_achievement_percentage
        tests:
          - not_null

      - name: street
        tests:
          - not_null

      - name: city
        tests:
          - not_null

      - name: state
        tests:
          - not_null

      - name: zip_code
        tests:
          - not_null

      - name: certifications
        tests:
          - not_null

      - name: total_orders_processed
        tests:
          - not_null

      - name: total_sales_amount
        tests:
          - not_null

      - name: _source_file
        tests:
          - not_null

      - name: _loaded_at
        tests:
          - not_null

      - name: _batch_id
        tests:
          - not_null

    tests:

      - dbt_utils.expression_is_true:
          arguments:
            expression: "salary >= 0"

      - dbt_utils.expression_is_true:
          arguments:
            expression: "sales_target >= 0"

      - dbt_utils.expression_is_true:
          arguments:
            expression: "current_sales >= 0"

      - dbt_utils.expression_is_true:
          arguments:
            expression: "performance_rating between 0 and 5"

      - dbt_utils.expression_is_true:
          arguments:
            expression: "tenure_years >= 0"

      - dbt_utils.expression_is_true:
          arguments:
            expression: "total_orders_processed >= 0"

      - dbt_utils.expression_is_true:
          arguments:
            expression: "total_sales_amount >= 0"

      - dbt_utils.expression_is_true:
          arguments:
            expression: "hire_date <= current_date"

      - dbt_utils.expression_is_true:
          arguments:
            expression: "date_of_birth < hire_date"

      - dbt_utils.expression_is_true:
          arguments:
            expression: "last_modified_date >= hire_date"

      - dbt_utils.expression_is_true:
          arguments:
            expression: "first_name <> ''"

      - dbt_utils.expression_is_true:
          arguments:
            expression: "last_name <> ''"

      - dbt_utils.expression_is_true:
          arguments:
            expression: "department <> ''"

      - dbt_utils.expression_is_true:
          arguments:
            expression: "role <> ''"

      - dbt_utils.expression_is_true:
          arguments:
            expression: "email <> ''"

      - dbt_utils.expression_is_true:
          arguments:
            expression: "phone <> ''"