version: 2

models:
  - name: silver_campaign
    description: Cleaned campaign dimension data

    columns:
      - name: campaign_id
        tests:
          - unique
          - not_null

      - name: campaign_name
        tests:
          - not_null

      - name: campaign_type
        tests:
          - not_null

      - name: channel
        tests:
          - not_null

      - name: description
        tests:
          - not_null

      - name: target_audience
        tests:
          - not_null

      - name: start_date
        tests:
          - not_null

      - name: end_date
        tests:
          - not_null

      - name: last_modified_date
        tests:
          - not_null

      - name: budget
        tests:
          - not_null

      - name: total_cost
        tests:
          - not_null

      - name: total_revenue
        tests:
          - not_null

      - name: roi_calculation
        tests:
          - not_null

      - name: _source_file
        tests:
          - not_null

      - name: _loaded_at
        tests:
          - not_null

      - name: _batch_id
        tests:
          - not_null

      - name: campaign_type
        tests:
         - accepted_values:
             arguments:
              values:
                  - Brand Awareness
                  - Clearance
                  - Discount Event
                  - Product Launch
                  - Seasonal Promotion
      - name: channel
        tests:
          - accepted_values:
              arguments:
                values:
                  - Digital Ads
                  - Email
                  - In-Store
                  - Multiple (Email, Social Media, In-Store)
                  - Print Media
                  - Social Media


    tests:

      - dbt_utils.expression_is_true:
          arguments:
            expression: "budget >= 0"

      - dbt_utils.expression_is_true:
          arguments:
            expression: "total_cost >= 0"

      - dbt_utils.expression_is_true:
          arguments:
            expression: "total_revenue >= 0"

      - dbt_utils.expression_is_true:
          arguments:
            expression: "roi_calculation >= 0"

      - dbt_utils.expression_is_true:
          arguments:
            expression: "end_date >= start_date"

      - dbt_utils.expression_is_true:
          arguments:
            expression: "budget >= total_cost"

      - dbt_utils.expression_is_true:
          arguments:
            expression: "campaign_name <> ''"

      - dbt_utils.expression_is_true:
          arguments:
            expression: "campaign_type <> ''"

      - dbt_utils.expression_is_true:
          arguments:
            expression: "channel <> ''"

      - dbt_utils.expression_is_true:
          arguments:
            expression: "target_audience <> ''"