version: 2

models:
  - name: silver_store
    columns:
      - name: store_id
        tests:
          - unique
          - not_null

      - name: store_name
        tests:
          - not_null

      - name: manager_id
        tests:
          - relationships:
              arguments:
                to: ref('silver_employee')
                field: employee_id
              config:
                where: "manager_id is not null"

      - name: email
        tests:
          - unique

      - name: region
        tests:
          - not_null

      - name: opening_date
        tests:
          - not_null

      - name: employee_count
        tests:
          - not_null

      - name: current_sales
        tests:
          - not_null

      - name: sales_target
        tests:
          - not_null

      - name: size_sq_ft
        tests:
          - not_null

      - name: is_active
        tests:
          - not_null

      - name: city
        tests:
          - not_null

      - name: state
        tests:
          - not_null

      - name: country
        tests:
          - not_null

      - name: zip_code
        tests:
          - not_null
      - name: store_size_category
        tests:
           - not_null
           - accepted_values:
                arguments:
                  values:
                    - SMALL
                    - MEDIUM
                    - LARGE