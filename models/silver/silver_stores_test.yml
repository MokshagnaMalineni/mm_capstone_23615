version: 2

models:
  - name: silver_store
    description: Cleaned Store Data

    columns:

      - name: store_id
        tests:
          - unique
          - not_null

      - name: store_name
        tests:
          - not_null

      - name: store_type
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - Retail
                  - Outlet
                  - Flagship
                  - Warehouse

      - name: manager_id
        tests:
          - relationships:
              arguments:
                to: ref('silver_employee')
                field: employee_id
              config:
                where: "manager_id is not null"

      - name: email
        tests:
          - unique

      - name: region
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - North
                  - South
                  - East
                  - West
                  - Central

      - name: opening_date
        tests:
          - not_null

      - name: employee_count
        tests:
          - not_null

      - name: current_sales
        tests:
          - not_null

      - name: sales_target
        tests:
          - not_null

      - name: monthly_rent
        tests:
          - not_null

      - name: size_sq_ft
        tests:
          - not_null

      - name: is_active
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - true
                  - false

      - name: street
        tests:
          - not_null

      - name: city
        tests:
          - not_null

      - name: state
        tests:
          - not_null

      - name: country
        tests:
          - not_null

      - name: zip_code
        tests:
          - not_null

      - name: store_age
        tests:
          - not_null

      - name: store_size_category
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - Small
                  - Medium
                  - Large

      - name: sales_target_achievement_percentage
        tests:
          - not_null

      - name: revenue_per_sq_ft
        tests:
          - not_null

      - name: employee_efficiency
        tests:
          - not_null

      - name: performance_issue_flag
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - true
                  - false

    tests:

      - dbt_utils.expression_is_true:
          arguments:
            expression: "employee_count >= 0"

      - dbt_utils.expression_is_true:
          arguments:
            expression: "current_sales >= 0"

      - dbt_utils.expression_is_true:
          arguments:
            expression: "sales_target >= 0"

      - dbt_utils.expression_is_true:
          arguments:
            expression: "monthly_rent >= 0"

      - dbt_utils.expression_is_true:
          arguments:
            expression: "size_sq_ft > 0"

      - dbt_utils.expression_is_true:
          arguments:
            expression: "opening_date <= current_date"

      - dbt_utils.expression_is_true:
          arguments:
            expression: "store_age >= 0"

      - dbt_utils.expression_is_true:
          arguments:
            expression: "sales_target_achievement_percentage >= 0"

      - dbt_utils.expression_is_true:
          arguments:
            expression: "revenue_per_sq_ft >= 0"

      - dbt_utils.expression_is_true:
          arguments:
            expression: "employee_efficiency >= 0"