version: 2

models:
  - name: silver_orders

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - order_id
              - product_id

    columns:
      - name: order_id
        tests:
          - not_null

      - name: product_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('silver_product')
                field: product_id

      - name: customer_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('silver_customer')
                field: customer_id

      - name: employee_id
        tests:
          - relationships:
              arguments:
                to: ref('silver_employee')
                field: employee_id
              config:
                where: "employee_id is not null"

      - name: store_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('silver_store')
                field: store_id

      - name: campaign_id
        tests:
          - relationships:
              arguments:
                to: ref('silver_campaign')
                field: campaign_id
              config:
                where: "campaign_id is not null"

      - name: order_status
        tests:
          - not_null

      - name: payment_method
        tests:
          - not_null

      - name: shipping_method
        tests:
          - not_null

      - name: quantity
        tests:
          - not_null

      - name: unit_price
        tests:
          - not_null

      - name: cost_price
        tests:
          - not_null

      - name: delivery_status
        tests:
          - accepted_values:
              arguments:
                values:
                  - On Time
                  - Delayed
                  - Potentially Delayed
                  - In Transit

      - name: order_time_of_day
        tests:
          - accepted_values:
              arguments:
                values:
                  - Morning
                  - Afternoon
                  - Evening
                  - Night