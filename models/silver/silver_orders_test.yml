version: 2

models:
  - name: silver_orders
    columns:
      - name: order_id
        tests:
          - not_null

      - name: customer_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('silver_customer')
                field: customer_id

      - name: employee_id
        tests:
          - relationships:
              arguments:
                to: ref('silver_employee')
                field: employee_id
              config:
                where: "employee_id is not null"

      - name: store_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('silver_store')
                field: store_id

      - name: campaign_id
        tests:
          - relationships:
              arguments:
                to: ref('silver_campaign')
                field: campaign_id
              config:
                where: "campaign_id is not null"

      - name: order_status
        tests:
          - not_null

      - name: payment_method
        tests:
          - not_null

      - name: shipping_method
        tests:
          - not_null

      - name: quantity
        tests:
          - not_null

      - name: unit_price
        tests:
          - not_null

      - name: cost_price
        tests:
          - not_null

      - name: delivery_status
        tests:
          - accepted_values:
              arguments:
                values:
                  - 'On Time'
                  - 'Delayed'
                  - 'Potentially Delayed'
                  - 'In Transit'

      - name: order_time_of_day
        tests:
          - accepted_values:
              arguments:
                values:
                  - 'Morning'
                  - 'Afternoon'
                  - 'Evening'
                  - 'Night'
        
      - name: order_date
        tests:
          - not_null

      - name: created_at
        tests:
          - not_null

      - name: shipping_date
        tests:
          - not_null

      - name: delivery_date
        tests:
          - not_null

      - name: estimated_delivery_date
        tests:
          - not_null

      - name: total_amount
        tests:
          - not_null

      - name: shipping_cost
        tests:
          - not_null

      - name: tax_amount
        tests:
          - not_null

      - name: profit_amount
        tests:
          - not_null

      - name: line_revenue
        tests:
          - not_null

      - name: line_cost
        tests:
          - not_null

      - name: total_quantity
        tests:
          - not_null

      - name: order_source
        tests:
          - not_null

    tests:

      - dbt_utils.expression_is_true:
          arguments:
            expression: "quantity >= 0"

      - dbt_utils.expression_is_true:
          arguments:
            expression: "unit_price >= 0"

      - dbt_utils.expression_is_true:
          arguments:
            expression: "cost_price >= 0"

      - dbt_utils.expression_is_true:
          arguments:
            expression: "shipping_cost >= 0"

      - dbt_utils.expression_is_true:
          arguments:
            expression: "tax_amount >= 0"

      - dbt_utils.expression_is_true:
          arguments:
            expression: "order_discount_amount >= 0"

      - dbt_utils.expression_is_true:
          arguments:
            expression: "total_amount >= 0"

      - dbt_utils.expression_is_true:
          arguments:
            expression: "line_revenue >= line_cost"

      - dbt_utils.expression_is_true:
          arguments:
            expression: "shipping_date >= order_date"

      - dbt_utils.expression_is_true:
          arguments:
            expression: "delivery_date >= shipping_date"

      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - order_id
              - product_id