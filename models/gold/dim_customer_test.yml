version: 2

models:
  - name: dim_customer
    description: Customer Dimension (SCD Type 2)

    columns:

      - name: customer_key
        tests:
          - not_null

      - name: customer_id
        tests:
          - not_null

      - name: full_name
        tests:
          - not_null


      - name: registration_date
        tests:
          - not_null

      - name: valid_from
        tests:
          - not_null

      - name: is_current
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - true
                  - false

      - name: marketing_opt_in
        tests:
          - accepted_values:
              arguments:
                values:
                  - true
                  - false

      - name: loyalty_tier
        tests:
          - accepted_values:
              arguments:
                values:
                  - BRONZE
                  - SILVER
                  - GOLD
                  - PLATINUM

      - name: preferred_communication
        tests:
          - not_null

      - name: preferred_payment_method
        tests:
          - not_null

      - name: customer_segment
        tests:
          - accepted_values:
              arguments:
                values:
                  - Young
                  - Middle-aged
                  - Senior
                  - Unknown

      - name: country
        tests:
          - not_null

      - name: city
        tests:
          - not_null

      - name: state
        tests:
          - not_null