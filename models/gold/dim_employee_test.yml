version: 2

models:
  - name: dim_employee
    description: Employee Dimension

    columns:
      - name: employee_key
        tests:
          - unique
          - not_null

      - name: employee_id
        tests:
          - unique
          - not_null

      - name: full_name
        tests:
          - not_null

      - name: role
        tests:
          - not_null

      - name: work_location
        tests:
          - not_null

      - name: tenure_years
        tests:
          - not_null

      - name: email
        tests:
          - not_null

      - name: phone
        tests:
          - not_null

      - name: performance_rating
        tests:
          - not_null

      - name: sales_target
        tests:
          - not_null

      - name: current_sales
        tests:
          - not_null

      - name: target_achievement_percentage
        tests:
          - not_null

      - name: total_orders_processed
        tests:
          - not_null

      - name: total_sales_amount
        tests:
          - not_null

      - name: department
        tests:
          - not_null

      - name: employment_status
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - Active
                  - Inactive
                  - Terminated
                  - On Leave

      - name: manager_id

      - name: hire_date
        tests:
          - not_null

      - name: date_of_birth
        tests:
          - not_null